---
# ================================================================
# Rack Inventory Chat UI — OpenShift Manifests
# Namespace: aitp-ui
# Route: rack-inventory-chat.apps.ocp419.crucible.iisl.com
#
# IMPORTANT: Create the HTML ConfigMap FIRST using the HTML file:
#   oc create configmap rack-inventory-chat-html \
#     --from-file=index.html=rack-inventory-index.html \
#     -n aitp-ui --dry-run=client -o yaml | oc apply -f -
#
# Then apply this file:
#   oc apply -f rack-inventory-chat-manifests.yaml
# ================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rack-inventory-chat-nginx
  namespace: aitp-ui
  labels:
    app: rack-inventory-chat
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy /api/rack → n8n rack-inventory webhook
        location /api/rack {
            proxy_pass https://workflows.apps.ocp419.crucible.iisl.com/webhook/rack-inventory;
            proxy_http_version 1.1;
            proxy_set_header Host workflows.apps.ocp419.crucible.iisl.com;
            proxy_set_header Content-Type application/json;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rack-inventory-chat
  namespace: aitp-ui
  labels:
    app: rack-inventory-chat
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rack-inventory-chat
  template:
    metadata:
      labels:
        app: rack-inventory-chat
    spec:
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:alpine
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: html
        configMap:
          name: rack-inventory-chat-html
      - name: nginx-conf
        configMap:
          name: rack-inventory-chat-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: rack-inventory-chat
  namespace: aitp-ui
  labels:
    app: rack-inventory-chat
spec:
  selector:
    app: rack-inventory-chat
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rack-inventory-chat
  namespace: aitp-ui
  labels:
    app: rack-inventory-chat
spec:
  host: rack-inventory-chat.apps.ocp419.crucible.iisl.com
  to:
    kind: Service
    name: rack-inventory-chat
    weight: 100
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
