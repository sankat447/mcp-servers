server {
    listen 8080;
    server_name _;

    # Serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to n8n workflow
    location /api/ {
        proxy_pass https://workflows.apps.ocp419.crucible.iisl.com/webhook/dctrack-chat/;
        proxy_http_version 1.1;
        proxy_set_header Host workflows.apps.ocp419.crucible.iisl.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";
        proxy_ssl_verify off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Proxy MCP tool calls directly to MCP server
    location /mcp/ {
        proxy_pass https://sunbird-mcp.apps.ocp419.crucible.iisl.com/;
        proxy_http_version 1.1;
        proxy_set_header Host sunbird-mcp.apps.ocp419.crucible.iisl.com;
        proxy_set_header Content-Type "application/json";
        proxy_ssl_verify off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
