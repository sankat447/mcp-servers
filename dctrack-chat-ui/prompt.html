<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Prompts | Sunbird DCIM AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sunbird-orange: #F7941D;
            --sunbird-orange-light: #FFAD4A;
            --sunbird-orange-dark: #E07D00;
            --iisl-blue: #1E3A5F;
            --iisl-blue-light: #2C5282;
            --bg-primary: #0A0E14;
            --bg-secondary: #111821;
            --bg-tertiary: #1A2332;
            --bg-card: #151D2B;
            --bg-hover: #1F2A3C;
            --text-primary: #F0F4F8;
            --text-secondary: #A0AEC0;
            --text-muted: #718096;
            --success: #48BB78;
            --error: #FC8181;
            --blue: #63B3ED;
            --purple: #B794F4;
            --border: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(247, 148, 29, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--iisl-blue) 0%, var(--bg-secondary) 100%);
            border-bottom: 1px solid var(--border-highlight);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-left h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--sunbird-orange), var(--sunbird-orange-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }
        .open-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--sunbird-orange), var(--sunbird-orange-dark));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .open-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(247, 148, 29, 0.4);
        }
        .connection-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--error);
            transition: background 0.3s;
        }
        .connection-dot.connected { background: var(--success); }

        /* ── Progress bar ── */
        .progress-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 10px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 62px;
            z-index: 99;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sunbird-orange), var(--success));
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── Content ── */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 32px 80px;
        }

        /* ── Phase Section ── */
        .phase {
            margin-bottom: 32px;
        }
        .phase-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--iisl-blue), var(--bg-tertiary));
            border-radius: 10px;
            margin-bottom: 2px;
            cursor: pointer;
            user-select: none;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .phase-header:hover {
            border-color: var(--border-highlight);
        }
        .phase-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            padding: 0 8px;
            background: var(--sunbird-orange);
            color: #fff;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .phase-title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }
        .phase-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .phase-chevron {
            color: var(--text-muted);
            transition: transform 0.2s;
            font-size: 14px;
        }
        .phase.collapsed .phase-chevron { transform: rotate(-90deg); }
        .phase.collapsed .phase-body { display: none; }

        /* ── Prompt Rows ── */
        .phase-body {
            border-left: 2px solid var(--border);
            margin-left: 34px;
            padding-left: 0;
        }
        .prompt-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            position: relative;
        }
        .prompt-row:hover {
            background: var(--bg-hover);
        }
        .prompt-row.sent {
            opacity: 0.5;
        }
        .prompt-row.sent .prompt-status::after {
            content: '\2713';
            color: var(--success);
            font-size: 14px;
            font-weight: 700;
        }
        .prompt-num {
            width: 60px;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .prompt-info {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .prompt-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .class-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .class-tag.device { background: #2D3748; color: #63B3ED; }
        .class-tag.network { background: #2D3748; color: #B794F4; }
        .class-tag.rack-pdu { background: #2D3748; color: #FC8181; }
        .class-tag.data-panel { background: #2D3748; color: #48BB78; }
        .class-tag.passive { background: #2D3748; color: #A0AEC0; }
        .class-tag.probe { background: #2D3748; color: #F6AD55; }
        .class-tag.cabinet { background: #2D3748; color: #FFC107; }
        .class-tag.ticket { background: #2D3748; color: #D6BCFA; }
        .class-tag.query { background: #1A365D; color: #63B3ED; }
        .class-tag.modify { background: #362A1A; color: #F6AD55; }
        .class-tag.delete { background: #3B1A1A; color: #FC8181; }
        .class-tag.verify { background: #1A362A; color: #48BB78; }

        .prompt-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .prompt-expected {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
        }
        .prompt-status {
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-prompt-btn {
            width: 52px;
            min-width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            border-left: 1px solid var(--border);
            cursor: pointer;
            color: var(--sunbird-orange);
            font-size: 20px;
            transition: all 0.15s;
        }
        .send-prompt-btn:hover {
            background: rgba(247, 148, 29, 0.1);
            color: var(--sunbird-orange-light);
        }
        .send-prompt-btn:active {
            background: rgba(247, 148, 29, 0.2);
            transform: scale(0.95);
        }
        .send-prompt-btn.sent {
            color: var(--success);
            cursor: default;
        }

        /* ── Note rows ── */
        .prompt-row.note-row {
            background: rgba(247, 148, 29, 0.03);
        }
        .prompt-row.note-row .prompt-text {
            background: rgba(247, 148, 29, 0.06);
            border-color: var(--border-highlight);
            color: var(--sunbird-orange-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-style: italic;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border-highlight);
            box-shadow: var(--shadow-md);
            z-index: 1000;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .content { padding: 16px; }
            .prompt-num { width: 44px; min-width: 44px; font-size: 10px; }
            .phase-body { margin-left: 22px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">

    </div>
</div>

</div>

<div class="content" id="content"></div>

    prompts: [
      { num: '6.1', label: 'List All AI-ROOM-01 Items', prompt: 'What items are installed in cabinets AI-CAB-01, AI-CAB-02, and AI-CAB-03?', expected: 'Shows all items across 3 cabinets.', tags: ['query'] },
      { num: '6.2', label: 'Bulk Delete CAB-01 Items', prompt: 'Delete the following items from dcTrack. For each one, search by name to get the itemId, then delete it:\n\n- AI-PDU-A1\n- AI-PDU-A2\n- AI-PROBE-01\n- AI-PATCH-01\n- AI-WM-01\n- AI-SRV-01\n- AI-SRV-02\n- AI-SRV-03\n- AI-SRV-04\n- AI-BLANK-01\n- AI-SRV-08', expected: 'All CAB-01 items deleted (including moved SRV-08).', tags: ['delete'] },
      { num: '6.3', label: 'Verify CAB-01 Empty', prompt: 'What items are installed in cabinet AI-CAB-01?', expected: 'No items.', tags: ['verify'] },
      { num: '6.4', label: 'Bulk Delete CAB-02 Items', prompt: 'Delete the following items from dcTrack. For each one, search by name to get the itemId, then delete it:\n\n- AI-PDU-B1\n- AI-PDU-B2\n- AI-TOR-01\n- AI-TOR-02\n- AI-PATCH-02\n- AI-WM-02\n- AI-PATCH-03\n- AI-SRV-05\n- AI-SRV-06\n- AI-BLANK-02', expected: 'All CAB-02 items deleted.', tags: ['delete'] },
      { num: '6.5', label: 'Verify CAB-02 Empty', prompt: 'What items are installed in cabinet AI-CAB-02?', expected: 'No items.', tags: ['verify'] },
      { num: '6.6', label: 'Bulk Delete CAB-03 Items', prompt: 'Delete the following items from dcTrack. For each one, search by name to get the itemId, then delete it:\n\n- AI-PDU-C1\n- AI-SRV-07\n- AI-TOR-03\n- AI-PROBE-02\n- AI-PATCH-04\n- AI-WM-03\n- AI-BLANK-03', expected: 'All CAB-03 items deleted.', tags: ['delete'] },
      { num: '6.7', label: 'Verify CAB-03 Empty', prompt: 'What items are installed in cabinet AI-CAB-03?', expected: 'No items.', tags: ['verify'] },
      { num: '6.8', label: 'Bulk Delete Cabinets', prompt: 'Delete the following cabinets from dcTrack. For each one, search by name to get the itemId, then delete it:\n\n- AI-CAB-01\n- AI-CAB-02\n- AI-CAB-03', expected: 'All 3 cabinets deleted.', tags: ['delete','cabinet'] },
      { num: '6.9', label: 'Delete Ticket', prompt: 'Search for tickets using dctrack_search_tickets, find the most recent one, get its ID, then delete it using dctrack_delete_ticket', tags: ['delete','ticket'] },
      { num: '6.10', label: 'Confirm Location Empty', prompt: 'Search for all items in location AI-ROOM-01', expected: 'No items found.', tags: ['verify'] },
      { num: '6.11', label: 'Confirm No Cabinets', prompt: 'Find cabinets in AI-ROOM-01', expected: 'No cabinets. Fully restored.', tags: ['verify'] },
    ]
  },
];

// ─── Cross-tab communication via BroadcastChannel ───
const bc = new BroadcastChannel('dctrack-demo');
let chatConnected = false;

bc.onmessage = (e) => {
    if (e.data?.type === 'chat-ready' || e.data?.type === 'chat-ack') {
        chatConnected = true;
        document.getElementById('connDot').classList.add('connected');
        document.getElementById('connDot').title = 'Chat tab connected';
    }
};

// Ping chat on load
setInterval(() => { bc.postMessage({ type: 'ping' }); }, 3000);

// ─── Open Chat ───
let chatWindow = null;
document.getElementById('openChatBtn').addEventListener('click', () => {
    const url = window.location.origin + '/';
    chatWindow = window.open(url, 'dctrack-chat');
    if (chatWindow) chatWindow.focus();
});

// ─── Render ───
const content = document.getElementById('content');
let totalPrompts = 0;
let sentCount = 0;
const sentSet = new Set(JSON.parse(localStorage.getItem('demo-sent') || '[]'));

PHASES.forEach(phase => {
    totalPrompts += phase.prompts.length;
    const div = document.createElement('div');
    div.className = 'phase';
    div.id = phase.id;

    // Header
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `
        <span class="phase-badge">${phase.badge}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-count">${phase.prompts.length} prompts</span>
        <span class="phase-chevron">\u25BC</span>
    `;
    header.addEventListener('click', () => div.classList.toggle('collapsed'));
    div.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'phase-body';

    phase.prompts.forEach(p => {
        const row = document.createElement('div');
        row.className = 'prompt-row' + (sentSet.has(p.num) ? ' sent' : '');
        row.dataset.num = p.num;

        const tags = (p.tags || []).map(t => `<span class="class-tag ${t}">${t}</span>`).join('');
        const editable = p.editable ? ' contenteditable="true" spellcheck="false"' : '';

        row.innerHTML = `
            <div class="prompt-num">${p.num}</div>
            <div class="prompt-info">
                <div class="prompt-label">${p.label} ${tags}</div>
                <div class="prompt-text"${editable}>${escHtml(p.prompt)}</div>
                ${p.expected ? `<div class="prompt-expected">\u2192 ${escHtml(p.expected)}</div>` : ''}
            </div>
            <div class="prompt-status"></div>
            <button class="send-prompt-btn ${sentSet.has(p.num) ? 'sent' : ''}" title="Send to Chat">\u27A4</button>
        `;

        const btn = row.querySelector('.send-prompt-btn');
        btn.addEventListener('click', () => sendToChat(p.num, row));
        body.appendChild(row);
    });

    div.appendChild(body);
    content.appendChild(div);
});

// Count initial sent
sentSet.forEach(n => sentCount++);
updateProgress();

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sendToChat(num, row) {
    const promptEl = row.querySelector('.prompt-text');
    const text = promptEl.textContent.trim();

    if (!chatConnected) {
        showToast('\u26A0 Chat tab not connected. Click "Open Chat" first.');
        return;
    }

    bc.postMessage({ type: 'set-prompt', text });
    row.classList.add('sent');
    row.querySelector('.send-prompt-btn').classList.add('sent');
    sentSet.add(num);
    sentCount = sentSet.size;
    localStorage.setItem('demo-sent', JSON.stringify([...sentSet]));
    updateProgress();
    showToast('\u2713 Sent to chat: ' + text.substring(0, 60) + (text.length > 60 ? '...' : ''));
}

function updateProgress() {
    const pct = totalPrompts > 0 ? (sentCount / totalPrompts * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = sentCount + ' / ' + totalPrompts + ' prompts sent';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('visible'), 2500);
}
</script>
</body>
